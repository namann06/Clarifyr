# ============================================================
# Clarifyr - Application Configuration
# ============================================================

spring.application.name=clarifyr

# ------------------------------------------------------------
# Profiles & Imports Configuration
# dev: active for development-specific log/Hibernate configs
# Imports optional local properties (git-ignored) for local development secrets
# ------------------------------------------------------------
spring.profiles.active=dev
spring.config.import=optional:classpath:application-local.properties

# ------------------------------------------------------------
# Server Configuration
# ------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# ------------------------------------------------------------
# Database Configuration (MySQL)
# NEVER hardcode credentials — use environment variables
# ------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:clarifyr_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# ------------------------------------------------------------
# JPA / Hibernate Configuration
# ------------------------------------------------------------
# ddl-auto: update = auto-create/alter tables (dev only)
# For production, use 'validate' or 'none' with Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Settings
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Let Hibernate auto-detect the dialect from the DB connection
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# Logging Configuration
# ------------------------------------------------------------
logging.level.root=INFO
logging.level.com.clarifyr=DEBUG
logging.level.org.springframework.security=INFO

# ------------------------------------------------------------
# Jackson (JSON) Configuration
# ------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
